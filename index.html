<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connection Check</title>
    <link rel="stylesheet" href="game.css>

    <!-- Google AdSense Auto Ads Code -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9083823868055674"
        crossorigin="anonymous"></script>
</head>
<body>
    <!-- Network status checker -->
    <div id="status"></div>
    
    <script>
      function loadGamePage() {
        document.body.innerHTML += `
          <div class="container">
              <div class="top-bar">
                  <h1>Game Title</h1>
              </div>
              
              <div class="game-box">
                  <p>Welcome! Play the game without signing up or <a href="signup.html">sign up</a> to save your progress and get more features.</p>
                  <iframe src="yourgame.html" width="600" height="400"></iframe>
              </div>
              
              <div class="ad-section">
                  <p>Advertisement Area</p>
                  <!-- Auto Ads will automatically display ads in this area -->
              </div>
              
              <div class="bottom-bar">
                  <p>Bottom Bar Content</p>
              </div>
          </div>
        `;
      }

      function checkConnection() {
        const statusDiv = document.getElementById("status");
        if (navigator.onLine) {
          statusDiv.innerHTML = `
            <div style="color: green; font-size: 24px; text-align: center; padding: 20px;">
              You are connected to the internet. Loading the game...
            </div>`;
          loadGamePage(); // Load the game content
        } else {
          statusDiv.innerHTML = `
            <div style="color: red; font-size: 24px; text-align: center; padding: 20px; background-color: #ffe6e6; border: 2px solid red; border-radius: 10px;">
              No internet connection. Check your connection.
              Possible reasons:
              - The page might be unavailable at the moment.
              - GitHub might have issues with MySQL databases.
            </div>`;
        }
      }

      window.addEventListener('load', checkConnection);
      window.addEventListener('online', checkConnection);
      window.addEventListener('offline', checkConnection);
    </script>
</body>
</html>
